<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>WHISKY NOTES</title>
<link rel="apple-touch-icon" href="IMG_8347.jpeg">
<script src="https://cdn.tailwindcss.com"></script>
<style>
.hidden { display: none !important; }
.amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }

.star-rating { direction: rtl; display: inline-flex; }
.star-rating input { display: none; }
.star-rating label { color: #d1d5db; font-size: 1.75rem; cursor: pointer; }
.star-rating input:checked ~ label { color: #f59e0b; }

.tag-btn {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 999px;
    background: #f1f5f9;
    border: 1px solid #e5e7eb;
}
.tag-btn.active {
    background: #d97706;
    color: white;
}
</style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900">
<div id="loading-view" class="fixed inset-0 flex items-center justify-center bg-stone-900 text-white">
Loading...
</div>
<div id="login-overlay" class="fixed inset-0 bg-stone-900 hidden flex items-center justify-center text-white">
<button id="login-btn" class="bg-white text-black px-6 py-3 rounded">Google Login</button>
</div>
<main id="app-content" class="p-4 max-w-md mx-auto hidden">
<input id="whisky-name" placeholder="銘柄名" class="w-full p-3 mb-3 border rounded" />
<textarea id="whisky-nose" placeholder="香り" class="w-full p-3 mb-2 border rounded"></textarea>
<!-- タグ -->
<div class="mb-3">
<div id="nose-tags" class="flex flex-wrap gap-2">
<button class="tag-btn">フルーツ</button>
<button class="tag-btn">バニラ</button>
<button class="tag-btn">スモーク</button>
<button class="tag-btn">スパイス</button>
<button class="tag-btn">ウッディ</button>
</div>
</div>
<textarea id="whisky-palate" placeholder="味わい" class="w-full p-3 mb-2 border rounded"></textarea>
<!-- スライダー -->
<div class="mb-4">
<label>甘味</label>
<input type="range" id="sweetness" min="0" max="5" value="3" class="w-full">
</div>
<textarea id="whisky-finish" placeholder="余韻" class="w-full p-3 mb-3 border rounded"></textarea>
<div id="notes-list" class="mt-6 space-y-4"></div>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { /* ←そのまま使ってOK */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);

// タグトグル
document.addEventListener("click", e => {
    if (e.target.classList.contains("tag-btn")) {
        e.target.classList.toggle("active");
    }
});

// 自動生成
function generateNote(tags, sweet, smoke) {
    let t = "";
    if (tags.includes("フルーツ")) t += "フルーティーな香り。";
    if (tags.includes("バニラ")) t += "バニラの甘さ。";
    if (tags.includes("スモーク")) t += "スモーキー。";
    if (sweet >= 4) t += "甘みが強い。";
    if (smoke >= 4) t += "ピート強め。";
    return t;
}

$("login-btn").onclick = async () => {
    await signInWithPopup(auth, new GoogleAuthProvider());
};

onAuthStateChanged(auth, user => {
    if (user) {
        $("login-overlay").classList.add("hidden");
        $("app-content").classList.remove("hidden");
        loadNotes(user.uid);
    } else {
        $("login-overlay").classList.remove("hidden");
    }
});

function loadNotes(uid) {
    const q = query(collection(db, "whisky_notes"), where("userId","==",uid), orderBy("createdAt","desc"));

    onSnapshot(q, snap => {
        $("notes-list").innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            $("notes-list").innerHTML += `
            <div class="bg-white p-4 rounded border">
                <b>${d.name}</b>
                <p>${d.autoNote || ""}</p>
            </div>`;
        });
    });
}

$("save-btn").onclick = async () => {
    const tags = [...document.querySelectorAll(".tag-btn.active")].map(el=>el.innerText);
    const sweet = Number($("sweetness").value);
    const smoke = Number($("smokiness").value);

    await addDoc(collection(db, "whisky_notes"), {
        userId: auth.currentUser.uid,
        name: $("whisky-name").value,
        nose: $("whisky-nose").value,
        palate: $("whisky-palate").value,
        finish: $("whisky-finish").value,
        noseTags: tags,
        sweetness: sweet,
        smokiness: smoke,
        autoNote: generateNote(tags, sweet, smoke),
        createdAt: serverTimestamp()
    });
};
</script>
</body>
</html>
:::
