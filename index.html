<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WHISKY NOTES</title>
    <link rel="apple-touch-icon" href="IMG_8347.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'whisky-dark': '#3f2305',
                        'whisky-amber': '#d97706',
                        'whisky-light': '#fef3c7',
                    },
                }
            }
        }
    </script>
    <style>
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
        meta[name="apple-mobile-web-app-capable"] { content: "yes"; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input[type="radio"] { display: none; }
        .star-rating label { color: #d1d5db; font-size: 1.75rem; cursor: pointer; transition: color 0.2s; }
        .star-rating input[type="radio"]:checked ~ label { color: #f59e0b; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24; }
        
        #wheel-content {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: #f5f5f4;
        }
        #wheel-content img {
            width: 100%;
            height: auto;
            max-width: 500px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-12 text-stone-900 font-sans">

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center bg-stone-900 text-white">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p class="text-xs text-stone-400">Loading...</p>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?q=80&w=800'); background-size: cover; background-position: center;"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-5xl font-serif font-bold mb-3 italic text-whisky-light tracking-tighter">Whisky Notes</h1>
            <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 active:scale-95 transition-all mx-auto">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <header class="amber-gradient text-white p-5 shadow-lg sticky top-0 z-40 text-center">
        <h1 class="text-xl font-serif font-bold tracking-[0.2em] uppercase italic">Whisky Notes</h1>
    </header>

    <button id="open-wheel" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-stone-900 text-amber-500 rounded-full shadow-2xl flex items-center justify-center border-2 border-amber-600 active:scale-90 transition-transform">
        <span class="text-[10px] font-bold text-center leading-tight">Flavor<br>Wheel</span>
    </button>

    <div id="wheel-modal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-4" onclick="closeWheel()">
        <div class="relative max-w-lg w-full bg-white rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-3 border-b flex justify-between items-center bg-stone-50">
                <span class="text-xs font-bold text-stone-500 uppercase tracking-widest">Flavor Wheel</span>
                <button onclick="closeWheel()" class="text-stone-400 hover:text-stone-900 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div id="wheel-content">
                <img src="IMG_8379.webp" alt="Flavor Wheel">
            </div>
            <div class="p-3 bg-stone-50 text-center">
                <p class="text-[10px] text-stone-400">タップして詳細を確認できます</p>
            </div>
        </div>
    </div>

    <main id="app-content" class="p-4 max-w-md mx-auto hidden pb-20">
        
        <div class="mb-6 sticky top-[88px] z-30">
            <input type="text" id="search-input" placeholder="コレクションを検索 (銘柄、蒸留所...)" class="w-full p-3 shadow-md border border-stone-200 rounded-full bg-white/95 backdrop-blur text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>

        <div id="entry-form" class="bg-white rounded-2xl shadow-xl p-6 mb-10 border border-stone-200">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-xs uppercase text-stone-400 font-bold tracking-wider italic">New Entry</h2>
                <button id="cancel-edit" class="hidden text-xs text-red-500 font-bold uppercase">Cancel Edit</button>
            </div>
            
            <input type="hidden" id="editing-id" value="">

            <input type="text" id="whisky-name" placeholder="ボトル名" class="w-full p-3.5 mb-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 text-base" />
            
            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-distillery" placeholder="蒸留所" class="w-1/2 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                <input type="text" id="whisky-region" placeholder="地域" class="w-1/2 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
            </div>

            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-vintage" placeholder="年数 / ヴィンテージ" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                <input type="text" id="whisky-abv" placeholder="ABV %" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
            </div>

            <input type="text" id="whisky-cask" placeholder="カスクタイプ" class="w-full p-3 mb-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />

            <div class="flex items-end gap-6 mb-6 border-b border-stone-100 pb-4">
                <div class="w-1/2">
                    <label class="text-[10px] text-stone-400 font-bold ml-1 uppercase block mb-1">Tasting Date</label>
                    <input type="date" id="whisky-date" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                </div>
                <div class="w-1/2 flex flex-col items-end">
                    <span class="text-[10px] text-stone-400 uppercase font-bold tracking-wider mb-1 mr-1">Rating</span>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3" checked /><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                    </div>
                </div>
            </div>

            <div class="space-y-4 mb-6">
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Nose</span>
                    <textarea id="whisky-nose" placeholder="香りについて..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Palate</span>
                    <textarea id="whisky-palate" placeholder="味わいについて..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Finish</span>
                    <textarea id="whisky-finish" placeholder="余韻について..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-20 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
            </div>

            <button id="save-btn" class="w-full amber-gradient text-white font-bold py-4 rounded-xl shadow-lg active:opacity-90 transition-all active:scale-95 text-lg">
                Add Note
            </button>
        </div>

        <div id="notes-list" class="space-y-5"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const $ = (id) => document.getElementById(id);

        let allNotes = [];

        window.closeWheel = () => $("wheel-modal").classList.add("hidden");
        $("open-wheel").onclick = () => $("wheel-modal").classList.remove("hidden");

        const formFields = ["whisky-name", "whisky-distillery", "whisky-region", "whisky-vintage", "whisky-abv", "whisky-cask", "whisky-date", "whisky-nose", "whisky-palate", "whisky-finish"];

        // 調整1: タイムゾーンを考慮して正しい今日の日付をセット
        function setTodayDate() {
            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            $("whisky-date").value = today.toISOString().slice(0, 10);
        }
        setTodayDate();

        // 調整2: 下書き保存機能の復活（入力中にブラウザを閉じても安心）
        function saveToDraft() {
            if ($("editing-id").value) return; // 編集中のデータはドラフト保存しない
            const draft = {};
            formFields.forEach(id => draft[id] = $(id).value);
            draft.rating = document.querySelector('input[name="rating"]:checked')?.value;
            localStorage.setItem("whisky_draft", JSON.stringify(draft));
        }

        function loadFromDraft() {
            const saved = localStorage.getItem("whisky_draft");
            if (saved) {
                try {
                    const draft = JSON.parse(saved);
                    formFields.forEach(id => { if(draft[id]) $(id).value = draft[id]; });
                    if (draft.rating) {
                        const rb = document.querySelector(`input[name="rating"][value="${draft.rating}"]`);
                        if(rb) rb.checked = true;
                    }
                } catch(e) { console.error("Draft parsing error", e); }
            }
        }

        // 入力があるたびにドラフト保存
        formFields.forEach(id => $(id).addEventListener('input', saveToDraft));
        document.querySelectorAll('input[name="rating"]').forEach(el => el.addEventListener('change', saveToDraft));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                $("login-overlay").classList.add("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.remove("hidden");
                loadFromDraft(); // ログイン時にドラフト復元
                loadNotes(user.uid);
            } else {
                $("login-overlay").classList.remove("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.add("hidden");
            }
        });

        $("login-btn").onclick = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } catch (e) { console.error("Login failed:", e); }
        };

        // 調整3: 検索状態を維持しながらリストを描画する関数
        function applyFilterAndRender() {
            const term = $("search-input").value.toLowerCase();
            if (!term) {
                renderNotes(allNotes);
                return;
            }
            const filtered = allNotes.filter(n => 
                (n.name?.toLowerCase().includes(term)) || 
                (n.distillery?.toLowerCase().includes(term)) ||
                (n.region?.toLowerCase().includes(term))
            );
            renderNotes(filtered);
        }

        function loadNotes(uid) {
            const q = query(collection(db, "whisky_notes"), where("userId", "==", uid));
            onSnapshot(q, (snapshot) => {
                allNotes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // 新しい順に並び替え
                allNotes.sort((a, b) => {
                    const timeA = a.createdAt?.toMillis() || 0;
                    const timeB = b.createdAt?.toMillis() || 0;
                    return timeB - timeA;
                });

                applyFilterAndRender(); // 検索中ならフィルタを維持して描画
            }, (err) => {
                console.error("Firestore Listen Error:", err);
            });
        }

        function renderNotes(notes) {
            const list = $("notes-list");
            list.innerHTML = notes.map(data => {
                const rating = data.rating || 0;
                let stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
                
                const details = [
                    data.region,
                    data.vintage,
                    data.abv ? `${data.abv}%` : null,
                    data.cask
                ].filter(Boolean).join(' / ');

                return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 relative">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-stone-900 leading-tight">${escapeHtml(data.name)}</h3>
                            <span class="text-amber-500 text-sm shrink-0 ml-2">${stars}</span>
                        </div>
                        
                        <div class="text-[11px] text-stone-500 mb-1 flex flex-wrap gap-x-2">
                            <span class="font-bold text-stone-700">${escapeHtml(data.distillery || 'Unknown')}</span>
                            <span>${data.tastingDate || ''}</span>
                        </div>

                        ${details ? `<p class="text-[10px] text-stone-400 mb-4 italic">${escapeHtml(details)}</p>` : '<div class="mb-4"></div>'}

                        <div class="space-y-2 text-sm mb-4">
                            ${data.nose ? `<p><span class="font-bold text-amber-800">[Nose]</span> ${escapeHtml(data.nose)}</p>` : ''}
                            ${data.palate ? `<p><span class="font-bold text-amber-800">[Palate]</span> ${escapeHtml(data.palate)}</p>` : ''}
                            ${data.finish ? `<p><span class="font-bold text-amber-800">[Finish]</span> ${escapeHtml(data.finish)}</p>` : ''}
                        </div>
                        <div class="flex justify-end gap-4 border-t pt-3">
                            <button onclick="window.startEdit('${data.id}')" class="text-xs font-bold text-amber-600 uppercase tracking-tighter">Edit</button>
                            <button onclick="window.deleteNoteWrapper('${data.id}')" class="text-xs font-bold text-red-400 uppercase tracking-tighter">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.deleteNoteWrapper = async (id) => {
            if (!confirm("このノートを完全に削除しますか？")) return;
            try {
                const docRef = doc(db, "whisky_notes", id);
                await deleteDoc(docRef);
            } catch (e) { 
                console.error("Delete Error:", e);
                alert("削除に失敗しました。"); 
            }
        };

        window.startEdit = (id) => {
            const note = allNotes.find(n => n.id === id);
            if (!note) return;

            $("editing-id").value = id;
            $("whisky-name").value = note.name || "";
            $("whisky-distillery").value = note.distillery || "";
            $("whisky-region").value = note.region || "";
            $("whisky-vintage").value = note.vintage || "";
            $("whisky-abv").value = note.abv || "";
            $("whisky-cask").value = note.cask || "";
            $("whisky-date").value = note.tastingDate || "";
            $("whisky-nose").value = note.nose || "";
            $("whisky-palate").value = note.palate || "";
            $("whisky-finish").value = note.finish || "";
            
            const rb = document.querySelector(`input[name="rating"][value="${note.rating}"]`);
            if(rb) rb.checked = true;

            $("form-title").innerText = "Edit Entry";
            $("save-btn").innerText = "Update Note";
            $("cancel-edit").classList.remove("hidden");
            $("entry-form").scrollIntoView({ behavior: 'smooth' });
        };

        $("cancel-edit").onclick = () => resetForm();

        function resetForm() {
            $("editing-id").value = "";
            formFields.forEach(id => $(id).value = "");
            setTodayDate();
            $("form-title").innerText = "New Entry";
            $("save-btn").innerText = "Add Note";
            $("cancel-edit").classList.add("hidden");
            localStorage.removeItem("whisky_draft"); // クリア時にドラフトも削除
            applyFilterAndRender(); // 検索状態を反映
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return "";
            return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        $("save-btn").onclick = async () => {
            const name = $("whisky-name").value.trim();
            if (!name) return alert("ボトル名を入力してください");
            
            const currentEditingId = $("editing-id").value;

            // 調整4: 同名ボトルの重複登録防止チェックの復活
            const isDuplicate = allNotes.some(n => n.name === name && n.id !== currentEditingId);
            if (isDuplicate) {
                return alert("同じ名前のボトルが既に登録されています。");
            }

            const btn = $("save-btn");
            btn.disabled = true;

            const payload = {
                userId: auth.currentUser.uid,
                name: name,
                distillery: $("whisky-distillery").value.trim(),
                region: $("whisky-region").value.trim(),
                vintage: $("whisky-vintage").value.trim(),
                abv: $("whisky-abv").value.trim(),
                cask: $("whisky-cask").value.trim(),
                tastingDate: $("whisky-date").value,
                nose: $("whisky-nose").value.trim(),
                palate: $("whisky-palate").value.trim(),
                finish: $("whisky-finish").value.trim(),
                rating: Number(document.querySelector('input[name="rating"]:checked')?.value || 0),
                updatedAt: serverTimestamp()
            };

            try {
                if (currentEditingId) {
                    await updateDoc(doc(db, "whisky_notes", currentEditingId), payload);
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "whisky_notes"), payload);
                }
                resetForm();
            } catch (e) { 
                console.error("Save Error:", e);
                alert("データの保存に失敗しました。"); 
            } finally { 
                btn.disabled = false; 
            }
        };

        // 検索入力時の処理
        $("search-input").oninput = applyFilterAndRender;
    </script>
</body>
</html>
