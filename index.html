<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Whisky Notes</title>

            <link rel="apple-touch-icon" href="IMG_8347.jpeg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
        meta[name="apple-mobile-web-app-capable"] { content: "yes"; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900">

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center bg-stone-900 text-white">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p class="text-xs text-stone-400">読み込み中...</p>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-serif font-bold mb-8 italic">Whisky Notes</h1>
        <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-xl flex items-center gap-3 active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
            Googleでログイン
        </button>
        <p id="error-msg" class="mt-4 text-red-400 text-[10px] text-center"></p>
    </div>

    <header class="amber-gradient text-white p-6 shadow-md sticky top-0 z-40 text-center">
        <h1 class="text-2xl font-serif font-bold">My Collection</h1>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto hidden">
        <div class="bg-white rounded-xl shadow-sm p-5 mb-8 border border-stone-200">
            <input type="text" id="whisky-name" placeholder="銘柄名" class="w-full p-3 mb-3 bg-stone-50 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-600" />
            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-distillery" placeholder="蒸留所" class="w-2/3 p-3 bg-stone-50 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-600" />
                <input type="number" id="whisky-vintage" placeholder="Year" class="w-1/3 p-3 bg-stone-50 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-600" />
            </div>

            <div class="mb-4">
                <label class="text-[10px] text-stone-400 uppercase font-bold">Malty Score</label>
                <input type="range" id="malty-score" min="1" max="5" step="1" value="3" class="w-full h-2 bg-stone-200 rounded-lg appearance-none accent-amber-700" />
            </div>

            <textarea id="whisky-note" placeholder="テイスティングノート" class="w-full p-3 mb-3 bg-stone-50 border rounded-lg h-20 text-sm focus:outline-none focus:ring-2 focus:ring-amber-600"></textarea>

            <button id="save-btn" class="w-full amber-gradient text-white font-bold py-3 rounded-lg shadow-lg active:opacity-90">
                保存する
            </button>
        </div>

        <div id="notes-list" class="space-y-4"></div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[40%] max-w-[150px] bg-white/90 backdrop-blur-md border border-stone-200 rounded-full shadow-2xl flex justify-center p-2 z-40">
        <div class="p-2 text-amber-700 font-serif italic font-bold">W.N.</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            where,
            orderBy,
            onSnapshot,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const $ = (id) => document.getElementById(id);

        // ログイン監視
        onAuthStateChanged(auth, (user) => {
            if (user) {
                $("login-overlay").classList.add("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.remove("hidden");
                loadNotes(user.uid);
            } else {
                $("login-overlay").classList.remove("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.add("hidden");
            }
        });

        // ログイン処理
        $("login-btn").onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                $("error-msg").innerText = "ログインに失敗しました。";
            }
        };

        // ノート読み込み
        function loadNotes(uid) {
            const q = query(
                collection(db, "whisky_notes"),
                where("userId", "==", uid),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = $("notes-list");
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<p class="text-center text-sm text-stone-400 py-8">まだノートがありません</p>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement("div");
                    card.className = "bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-700 mb-3";
                    card.innerHTML = `
                        <h3 class="font-bold text-base">${escapeHtml(data.name || "")}</h3>
                        <p class="text-[10px] text-stone-400">
                            ${escapeHtml(data.distillery || "")} ${data.vintage ? '/ ' + escapeHtml(data.vintage) : ''}
                        </p>
                        <p class="text-[11px] text-amber-700 mt-1">Malty Score: ${data.maltyScore}/5</p>
                        <p class="text-sm mt-2 text-stone-600 whitespace-pre-wrap">${escapeHtml(data.note || "")}</p>
                    `;
                    list.appendChild(card);
                });
            }, (err) => {
                if(err.code === 'failed-precondition') {
                    $("notes-list").innerHTML = `<div class="bg-amber-50 border border-amber-200 text-amber-800 text-xs p-4 rounded-lg text-center">
                        現在、データベースを最適化中です。<br>5分ほど待ってから再読み込みしてください。
                    </div>`;
                } else if(err.code === 'permission-denied') {
                    $("notes-list").innerHTML = `<div class="bg-red-50 border border-red-200 text-red-800 text-xs p-4 rounded-lg text-center">
                        Firebaseのルール設定が正しくありません。<br>「ルール」タブを確認してください。
                    </div>`;
                }
            });
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        // 保存処理
        $("save-btn").onclick = async () => {
            const name = $("whisky-name").value.trim();
            if (!name) return alert("銘柄名を入力してください");

            try {
                await addDoc(collection(db, "whisky_notes"), {
                    userId: auth.currentUser.uid,
                    name: name,
                    distillery: $("whisky-distillery").value,
                    vintage: $("whisky-vintage").value,
                    maltyScore: Number($("malty-score").value),
                    note: $("whisky-note").value,
                    createdAt: serverTimestamp()
                });
                $("whisky-name").value = "";
                $("whisky-distillery").value = "";
                $("whisky-vintage").value = "";
                $("whisky-note").value = "";
            } catch (e) {
                alert("保存に失敗しました。");
            }
        };
    </script>
</body>
</html>
