<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WHISKY NOTES</title>
    <link rel="apple-touch-icon" href="IMG_8347.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'whisky-dark': '#3f2305',
                        'whisky-amber': '#d97706',
                        'whisky-light': '#fef3c7',
                    },
                }
            }
        }
    </script>
    <style>
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
        meta[name="apple-mobile-web-app-capable"] { content: "yes"; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input[type="radio"] { display: none; }
        .star-rating label { color: #d1d5db; font-size: 1.75rem; cursor: pointer; transition: color 0.2s; }
        .star-rating input[type="radio"]:checked ~ label { color: #f59e0b; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24; }
        
        #wheel-content {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: #f5f5f4;
        }
        #wheel-content img {
            width: 100%;
            height: auto;
            max-width: 500px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-12 text-stone-900 font-sans">

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center bg-stone-900 text-white">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p class="text-xs text-stone-400">Loading...</p>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?q=80&w=800'); background-size: cover; background-position: center;"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-5xl font-serif font-bold mb-3 italic text-whisky-light tracking-tighter">Whisky Notes</h1>
            <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 active:scale-95 transition-all mx-auto">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <header class="amber-gradient text-white p-5 shadow-lg sticky top-0 z-40 text-center">
        <h1 class="text-xl font-serif font-bold tracking-[0.2em] uppercase italic">Whisky Notes</h1>
    </header>

    <button id="open-wheel" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-stone-900 text-amber-500 rounded-full shadow-2xl flex items-center justify-center border-2 border-amber-600 active:scale-90 transition-transform">
        <span class="text-[10px] font-bold text-center leading-tight">Flavor<br>Wheel</span>
    </button>

    <div id="wheel-modal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-center justify-center p-4" onclick="closeWheel()">
        <div class="relative max-w-lg w-full bg-white rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-3 border-b flex justify-between items-center bg-stone-50">
                <span class="text-xs font-bold text-stone-500 uppercase tracking-widest">Flavor Wheel</span>
                <button onclick="closeWheel()" class="text-stone-400 hover:text-stone-900 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div id="wheel-content">
                <img src="IMG_8379.webp" alt="Flavor Wheel">
            </div>
            <div class="p-3 bg-stone-50 text-center">
                <p class="text-[10px] text-stone-400">タップして詳細を確認できます</p>
            </div>
        </div>
    </div>

    <main id="app-content" class="p-4 max-w-md mx-auto hidden pb-20">
        
        <div class="mb-6 sticky top-[88px] z-30">
            <input type="text" id="search-input" placeholder="Search collection (name, distillery...)" class="w-full p-3 shadow-md border border-stone-200 rounded-full bg-white/95 backdrop-blur text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
        </div>

        <div id="entry-form" class="bg-white rounded-2xl shadow-xl p-6 mb-10 border border-stone-200">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-xs uppercase text-stone-400 font-bold tracking-wider italic">New Entry</h2>
                <button id="cancel-edit" class="hidden text-xs text-red-500 font-bold uppercase">Cancel Edit</button>
            </div>
            
            <input type="hidden" id="editing-id" value="">

            <input type="text" id="whisky-name" placeholder="Whisky Name" class="w-full p-3.5 mb-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 text-base" />
            
            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-distillery" placeholder="Distillery" class="w-1/2 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                <input type="text" id="whisky-region" placeholder="Region" class="w-1/2 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
            </div>

            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-vintage" placeholder="Age / Vintage" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                <input type="text" id="whisky-abv" placeholder="ABV %" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
            </div>

            <input type="text" id="whisky-cask" placeholder="Cask Type" class="w-full p-3 mb-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />

            <div class="mb-6 border-t border-b border-stone-100 py-4">
                <span class="text-[10px] text-stone-400 font-bold uppercase block mb-3 tracking-widest text-center">Flavor Profile (0-5)</span>
                <div class="grid grid-cols-2 gap-x-6 gap-y-3">
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Fruity</label>
                        <input type="range" id="flavor-fruity" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Floral</label>
                        <input type="range" id="flavor-floral" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Peaty</label>
                        <input type="range" id="flavor-peaty" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Cereal</label>
                        <input type="range" id="flavor-cereal" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Woody</label>
                        <input type="range" id="flavor-woody" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Feinty</label>
                        <input type="range" id="flavor-feinty" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Spicy</label>
                        <input type="range" id="flavor-spicy" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                    <div>
                        <label class="text-[10px] text-stone-500 font-bold uppercase block mb-1">Sulphury</label>
                        <input type="range" id="flavor-sulphury" min="0" max="5" step="1" value="0" class="w-full h-1.5 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-600">
                    </div>
                </div>
            </div>

            <div class="flex items-end gap-6 mb-6 pb-4">
                <div class="w-1/2">
                    <label class="text-[10px] text-stone-400 font-bold ml-1 uppercase block mb-1">Tasting Date</label>
                    <input type="date" id="whisky-date" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none" />
                </div>
                <div class="w-1/2 flex flex-col items-end">
                    <span class="text-[10px] text-stone-400 uppercase font-bold tracking-wider mb-1 mr-1">Rating</span>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3" checked /><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                    </div>
                </div>
            </div>

            <div class="space-y-4 mb-6">
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Nose</span>
                    <textarea id="whisky-nose" placeholder="Nose notes..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Palate</span>
                    <textarea id="whisky-palate" placeholder="Palate notes..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded uppercase">Finish</span>
                    <textarea id="whisky-finish" placeholder="Finish notes..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-20 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                </div>
            </div>

            <button id="save-btn" class="w-full amber-gradient text-white font-bold py-4 rounded-xl shadow-lg active:opacity-90 transition-all active:scale-95 text-lg">
                Add Note
            </button>
        </div>

        <div id="notes-list" class="space-y-5"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const $ = (id) => document.getElementById(id);

        let allNotes = [];
        let chartInstances = {};

        window.closeWheel = () => $("wheel-modal").classList.add("hidden");
        $("open-wheel").onclick = () => $("wheel-modal").classList.remove("hidden");

        const flavorFields = ["flavor-fruity", "flavor-floral", "flavor-peaty", "flavor-cereal", "flavor-woody", "flavor-feinty", "flavor-spicy", "flavor-sulphury"];
        const formFields = ["whisky-name", "whisky-distillery", "whisky-region", "whisky-vintage", "whisky-abv", "whisky-cask", "whisky-date", "whisky-nose", "whisky-palate", "whisky-finish", ...flavorFields];

        function setTodayDate() {
            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            $("whisky-date").value = today.toISOString().slice(0, 10);
        }
        setTodayDate();

        function saveToDraft() {
            if ($("editing-id").value) return;
            const draft = {};
            formFields.forEach(id => draft[id] = $(id).value);
            draft.rating = document.querySelector('input[name="rating"]:checked')?.value;
            localStorage.setItem("whisky_draft", JSON.stringify(draft));
        }

        function loadFromDraft() {
            const saved = localStorage.getItem("whisky_draft");
            if (saved) {
                try {
                    const draft = JSON.parse(saved);
                    formFields.forEach(id => { if(draft[id]) $(id).value = draft[id]; });
                    if (draft.rating) {
                        const rb = document.querySelector(`input[name="rating"][value="${draft.rating}"]`);
                        if(rb) rb.checked = true;
                    }
                } catch(e) { console.error("Draft parsing error", e); }
            }
        }

        formFields.forEach(id => $(id).addEventListener('input', saveToDraft));
        document.querySelectorAll('input[name="rating"]').forEach(el => el.addEventListener('change', saveToDraft));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                $("login-overlay").classList.add("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.remove("hidden");
                loadFromDraft();
                loadNotes(user.uid);
            } else {
                $("login-overlay").classList.remove("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.add("hidden");
            }
        });

        $("login-btn").onclick = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } catch (e) { console.error("Login failed:", e); }
        };

        function applyFilterAndRender() {
            const term = $("search-input").value.toLowerCase();
            const filtered = term 
                ? allNotes.filter(n => (n.name?.toLowerCase().includes(term)) || (n.distillery?.toLowerCase().includes(term)) || (n.region?.toLowerCase().includes(term)))
                : allNotes;
            
            renderNotes(filtered);
            renderCharts(filtered);
        }

        function loadNotes(uid) {
            const q = query(collection(db, "whisky_notes"), where("userId", "==", uid));
            onSnapshot(q, (snapshot) => {
                allNotes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allNotes.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                applyFilterAndRender();
            });
        }

        function renderNotes(notes) {
            const list = $("notes-list");
            list.innerHTML = notes.map(data => {
                const rating = data.rating || 0;
                let stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
                const details = [data.region, data.vintage, data.abv ? `${data.abv}%` : null, data.cask].filter(Boolean).join(' / ');

                return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 relative">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-stone-900 leading-tight">${escapeHtml(data.name)}</h3>
                            <span class="text-amber-500 text-sm shrink-0 ml-2">${stars}</span>
                        </div>
                        <div class="text-[11px] text-stone-500 mb-1 flex flex-wrap gap-x-2">
                            <span class="font-bold text-stone-700">${escapeHtml(data.distillery || 'Unknown')}</span>
                            <span>${data.tastingDate || ''}</span>
                        </div>
                        ${details ? `<p class="text-[10px] text-stone-400 mb-3 italic">${escapeHtml(details)}</p>` : '<div class="mb-3"></div>'}

                        <div class="w-full max-w-[240px] mx-auto mb-4 bg-stone-50 rounded-xl p-2">
                            <canvas id="chart-${data.id}"></canvas>
                        </div>

                        <div class="space-y-2 text-sm mb-4">
                            ${data.nose ? `<p><span class="font-bold text-amber-800">[Nose]</span> ${escapeHtml(data.nose)}</p>` : ''}
                            ${data.palate ? `<p><span class="font-bold text-amber-800">[Palate]</span> ${escapeHtml(data.palate)}</p>` : ''}
                            ${data.finish ? `<p><span class="font-bold text-amber-800">[Finish]</span> ${escapeHtml(data.finish)}</p>` : ''}
                        </div>
                        <div class="flex justify-end gap-4 border-t pt-3">
                            <button onclick="window.startEdit('${data.id}')" class="text-xs font-bold text-amber-600 uppercase tracking-tighter">Edit</button>
                            <button onclick="window.deleteNoteWrapper('${data.id}')" class="text-xs font-bold text-red-400 uppercase tracking-tighter">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCharts(notes) {
            notes.forEach(data => {
                const canvas = document.getElementById(`chart-${data.id}`);
                if (!canvas) return;
                if (chartInstances[data.id]) { chartInstances[data.id].destroy(); }

                const f = data.flavors || { fruity:0, floral:0, peaty:0, cereal:0, woody:0, feinty:0, spicy:0, sulphury:0 };

                chartInstances[data.id] = new Chart(canvas, {
                    type: 'radar',
                    data: {
                        labels: ['Fruity', 'Floral', 'Peaty', 'Cereal', 'Woody', 'Feinty', 'Spicy', 'Sulphury'],
                        datasets: [{
                            data: [f.fruity, f.floral, f.peaty, f.cereal, f.woody, f.feinty, f.spicy, f.sulphury],
                            backgroundColor: 'rgba(217, 119, 6, 0.2)',
                            borderColor: '#d97706',
                            borderWidth: 2,
                            pointRadius: 2,
                            pointBackgroundColor: '#d97706'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            r: {
                                min: 0,
                                max: 5,
                                ticks: { stepSize: 1, display: false },
                                grid: { color: 'rgba(0,0,0,0.05)' },
                                angleLines: { color: 'rgba(0,0,0,0.05)' },
                                pointLabels: { font: { size: 8, weight: 'bold' }, color: '#78350f' }
                            }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            });
        }

        window.deleteNoteWrapper = async (id) => {
            if (!confirm("Are you sure you want to delete this note?")) return;
            try {
                await deleteDoc(doc(db, "whisky_notes", id));
            } catch (e) { alert("Delete Error: " + e.message); }
        };

        window.startEdit = (id) => {
            const note = allNotes.find(n => n.id === id);
            if (!note) return;

            $("editing-id").value = id;
            $("whisky-name").value = note.name || "";
            $("whisky-distillery").value = note.distillery || "";
            $("whisky-region").value = note.region || "";
            $("whisky-vintage").value = note.vintage || "";
            $("whisky-abv").value = note.abv || "";
            $("whisky-cask").value = note.cask || "";
            $("whisky-date").value = note.tastingDate || "";
            $("whisky-nose").value = note.nose || "";
            $("whisky-palate").value = note.palate || "";
            $("whisky-finish").value = note.finish || "";
            
            if (note.flavors) {
                $("flavor-fruity").value = note.flavors.fruity || 0;
                $("flavor-floral").value = note.flavors.floral || 0;
                $("flavor-peaty").value = note.flavors.peaty || 0;
                $("flavor-cereal").value = note.flavors.cereal || 0;
                $("flavor-woody").value = note.flavors.woody || 0;
                $("flavor-feinty").value = note.flavors.feinty || 0;
                $("flavor-spicy").value = note.flavors.spicy || 0;
                $("flavor-sulphury").value = note.flavors.sulphury || 0;
            }

            const rb = document.querySelector(`input[name="rating"][value="${note.rating}"]`);
            if(rb) rb.checked = true;

            $("form-title").innerText = "Edit Entry";
            $("save-btn").innerText = "Update Note";
            $("cancel-edit").classList.remove("hidden");
            $("entry-form").scrollIntoView({ behavior: 'smooth' });
        };

        $("cancel-edit").onclick = () => resetForm();

        function resetForm() {
            $("editing-id").value = "";
            formFields.forEach(id => {
                if (id.startsWith('flavor-')) $(id).value = 0;
                else $(id).value = "";
            });
            setTodayDate();
            $("form-title").innerText = "New Entry";
            $("save-btn").innerText = "Add Note";
            $("cancel-edit").classList.add("hidden");
            localStorage.removeItem("whisky_draft");
            applyFilterAndRender();
        }

        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        $("save-btn").onclick = async () => {
            const name = $("whisky-name").value.trim();
            if (!name) return alert("Please enter Whisky Name");
            
            const btn = $("save-btn");
            btn.disabled = true;

            const payload = {
                userId: auth.currentUser.uid,
                name: name,
                distillery: $("whisky-distillery").value.trim(),
                region: $("whisky-region").value.trim(),
                vintage: $("whisky-vintage").value.trim(),
                abv: $("whisky-abv").value.trim(),
                cask: $("whisky-cask").value.trim(),
                tastingDate: $("whisky-date").value,
                nose: $("whisky-nose").value.trim(),
                palate: $("whisky-palate").value.trim(),
                finish: $("whisky-finish").value.trim(),
                rating: Number(document.querySelector('input[name="rating"]:checked')?.value || 0),
                flavors: {
                    fruity: Number($("flavor-fruity").value),
                    floral: Number($("flavor-floral").value),
                    peaty: Number($("flavor-peaty").value),
                    cereal: Number($("flavor-cereal").value),
                    woody: Number($("flavor-woody").value),
                    feinty: Number($("flavor-feinty").value),
                    spicy: Number($("flavor-spicy").value),
                    sulphury: Number($("flavor-sulphury").value)
                },
                updatedAt: serverTimestamp()
            };

            try {
                const currentId = $("editing-id").value;
                if (currentId) {
                    await updateDoc(doc(db, "whisky_notes", currentId), payload);
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, "whisky_notes"), payload);
                }
                resetForm();
            } catch (e) { alert("Save Error: " + e.message); } finally { btn.disabled = false; }
        };

        $("search-input").oninput = applyFilterAndRender;
    </script>
</body>
</html>
