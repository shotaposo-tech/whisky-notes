<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky Notes</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900">

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-serif font-bold mb-8">Whisky Notes</h1>
        <button id="login-btn" class="bg-white text-stone-900 px-6 py-3 rounded-full font-bold shadow-lg flex items-center gap-3 active:scale-95 transition-transform">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleでログイン
        </button>
    </div>

    <header class="amber-gradient text-white p-6 shadow-md sticky top-0 z-40">
        <h1 class="text-2xl font-serif font-bold">My Collection</h1>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto">
        <section class="bg-white rounded-xl shadow-sm p-5 mb-8">
            <h2 class="font-bold border-b border-stone-200 pb-2 mb-4">新規テイスティング</h2>
            <div class="space-y-4">
                <input type="text" id="whisky-name" placeholder="銘柄名 (例: Ben Nevis 1996)" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg outline-amber-600">
                <div class="flex gap-2">
                    <input type="text" id="whisky-distillery" placeholder="蒸留所" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                    <input type="number" id="whisky-vintage" placeholder="Vintage" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                </div>
                <div>
                    <label class="text-sm text-stone-500 mb-1 block">麦感 (Malty Score: 1-5)</label>
                    <input type="range" id="malty-score" min="1" max="5" step="1" value="3" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-700">
                </div>
                <textarea id="whisky-note" placeholder="テイスティングノート" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg h-24"></textarea>
                <button id="save-btn" class="w-full amber-gradient text-white font-bold py-3 rounded-lg shadow-lg active:opacity-80">記録する</button>
            </div>
        </section>

        <div id="notes-list" class="space-y-4">
            </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/80 backdrop-blur-md border border-stone-200 rounded-full shadow-2xl flex justify-around p-2 z-40">
        <button class="flex flex-col items-center p-2 text-amber-700">
            <span class="text-xs font-bold">Home</span>
        </button>
        <button id="logout-btn" class="flex flex-col items-center p-2 text-stone-400">
            <span class="text-xs">Logout</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552",
            measurementId: "G-V02L78VHJP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // ログイン処理
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').classList.add('hidden');
                loadNotes();
            } else {
                currentUser = null;
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        });

        // データ保存
        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('whisky-name').value;
            if (!name) return alert("銘柄名を入力してください");

            try {
                await addDoc(collection(db, "whisky_notes"), {
                    userId: currentUser.uid,
                    name: name,
                    distillery: document.getElementById('whisky-distillery').value,
                    vintage: document.getElementById('whisky-vintage').value,
                    maltyScore: document.getElementById('malty-score').value,
                    note: document.getElementById('whisky-note').value,
                    createdAt: serverTimestamp()
                });
                // フォームリセット
                document.getElementById('whisky-name').value = '';
                document.getElementById('whisky-note').value = '';
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        };

        // データ読み込み（リアルタイム）
        function loadNotes() {
            const q = query(
                collection(db, "whisky_notes"),
                where("userId", "==", currentUser.uid),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('notes-list');
                list.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-600";
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-lg">${data.name}</h3>
                            <span class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded">麦感: ${data.maltyScore}</span>
                        </div>
                        <p class="text-sm text-stone-500 mt-1">${data.distillery || ''} ${data.vintage ? '| ' + data.vintage : ''}</p>
                        <p class="text-sm mt-3 text-stone-700 whitespace-pre-wrap">${data.note || ''}</p>
                    `;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
