<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whisky Notes</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
        /* ローディング表示用 */
        #loading-view { background: #1c1917; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900">

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center text-white">
        <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-serif font-bold mb-8 italic">Whisky Notes</h1>
        <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-xl flex items-center gap-3 active:scale-95 transition-transform">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleでログイン
        </button>
        <p class="mt-6 text-stone-500 text-sm">Tasting logs for enthusiasts.</p>
    </div>

    <header class="amber-gradient text-white p-6 shadow-md sticky top-0 z-40">
        <h1 class="text-2xl font-serif font-bold">My Collection</h1>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto">
        <section class="bg-white rounded-xl shadow-sm p-5 mb-8">
            <h2 class="font-bold border-b border-stone-200 pb-2 mb-4 text-amber-900">Add New Note</h2>
            <div class="space-y-4">
                <input type="text" id="whisky-name" placeholder="銘柄名 (例: Ben Nevis 1996)" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg outline-amber-600">
                <div class="flex gap-2">
                    <input type="text" id="whisky-distillery" placeholder="蒸留所" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                    <input type="number" id="whisky-vintage" placeholder="Vintage" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                </div>
                <div>
                    <label class="text-sm text-stone-500 mb-1 block font-medium">麦感 (Malty Score: 1-5)</label>
                    <input type="range" id="malty-score" min="1" max="5" step="1" value="3" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-700">
                </div>
                <textarea id="whisky-note" placeholder="テイスティングノート、評価など..." class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg h-24"></textarea>
                <button id="save-btn" class="w-full amber-gradient text-white font-bold py-3 rounded-lg shadow-lg active:opacity-80 transition-opacity">保存する</button>
            </div>
        </section>

        <div id="notes-list" class="space-y-4">
            </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-md border border-stone-200 rounded-full shadow-2xl flex justify-around p-2 z-40">
        <button class="flex flex-col items-center p-2 text-amber-700">
            <span class="text-xs font-bold font-serif italic text-lg">W.N.</span>
        </button>
        <button id="logout-btn" class="flex flex-col items-center p-2 text-stone-400 active:text-red-500">
            <span class="text-xs">Sign Out</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552",
            measurementId: "G-V02L78VHJP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // ログインボタンの処理 (リダイレクト方式)
        document.getElementById('login-btn').onclick = () => {
            signInWithRedirect(auth, provider);
        };

        // ログアウト処理
        document.getElementById('logout-btn').onclick = () => {
            if(confirm("ログアウトしますか？")) signOut(auth);
        };

        // 状態監視
        onAuthStateChanged(auth, async (user) => {
            const loadingView = document.getElementById('loading-view');
            const loginOverlay = document.getElementById('login-overlay');

            if (user) {
                currentUser = user;
                loginOverlay.classList.add('hidden');
                loadingView.classList.add('hidden');
                loadNotes();
            } else {
                currentUser = null;
                // リダイレクト結果を確認
                try {
                    await getRedirectResult(auth);
                } catch (error) {
                    console.error("Auth Error:", error);
                }
                loginOverlay.classList.remove('hidden');
                loadingView.classList.add('hidden');
            }
        });

        // データ保存
        document.getElementById('save-btn').onclick = async () => {
            const btn = document.getElementById('save-btn');
            const name = document.getElementById('whisky-name').value;
            if (!name) return alert("銘柄名を入力してください");

            btn.disabled = true;
            btn.innerText = "保存中...";

            try {
                await addDoc(collection(db, "whisky_notes"), {
                    userId: currentUser.uid,
                    name: name,
                    distillery: document.getElementById('whisky-distillery').value,
                    vintage: document.getElementById('whisky-vintage').value,
                    maltyScore: document.getElementById('malty-score').value,
                    note: document.getElementById('whisky-note').value,
                    createdAt: serverTimestamp()
                });
                
                // フォームリセット
                document.getElementById('whisky-name').value = '';
                document.getElementById('whisky-distillery').value = '';
                document.getElementById('whisky-vintage').value = '';
                document.getElementById('whisky-note').value = '';
                document.getElementById('malty-score').value = 3;
            } catch (e) {
                alert("保存に失敗しました。ルールやインデックスを確認してください。");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "保存する";
            }
        };

        // データ読み込み
        function loadNotes() {
            const q = query(
                collection(db, "whisky_notes"),
                where("userId", "==", currentUser.uid),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('notes-list');
                list.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "bg-white p-5 rounded-xl shadow-sm border-l-4 border-amber-700 active:bg-stone-50 transition-colors";
                    item.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-stone-800">${data.name}</h3>
                            <div class="flex flex-col items-end">
                                <span class="bg-amber-100 text-amber-900 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Malty: ${data.maltyScore}</span>
                            </div>
                        </div>
                        <div class="text-xs text-stone-400 flex gap-2 mb-3">
                            <span>${data.distillery || 'Unknown Distillery'}</span>
                            <span>${data.vintage ? '• ' + data.vintage : ''}</span>
                        </div>
                        <p class="text-sm text-stone-600 leading-relaxed whitespace-pre-wrap italic">"${data.note || 'No notes...'}"</p>
                    `;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
