<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whisky Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900">

    <div id="debug-log" class="fixed top-0 left-0 w-full bg-black/80 text-white text-[10px] p-1 z-[70] pointer-events-none">Waiting...</div>

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center bg-stone-900 text-white">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p id="loading-status" class="text-xs text-stone-400">認証情報を確認中...</p>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white">
        <h1 class="text-4xl font-serif font-bold mb-8 italic">Whisky Notes</h1>
        <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-xl flex items-center gap-3 active:scale-95 transition-transform">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleでログイン
        </button>
        <p id="error-message" class="mt-6 text-red-400 text-xs text-center px-4"></p>
    </div>

    <header class="amber-gradient text-white p-6 shadow-md sticky top-0 z-40">
        <h1 class="text-2xl font-serif font-bold">My Collection</h1>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto hidden">
        <section class="bg-white rounded-xl shadow-sm p-5 mb-8 border border-stone-200">
            <h2 class="font-bold border-b border-stone-200 pb-2 mb-4 text-amber-900">Add New Note</h2>
            <div class="space-y-4">
                <input type="text" id="whisky-name" placeholder="銘柄名 (例: Ben Nevis 1996)" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg outline-amber-600">
                <div class="flex gap-2">
                    <input type="text" id="whisky-distillery" placeholder="蒸留所" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                    <input type="number" id="whisky-vintage" placeholder="Year" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg">
                </div>
                <div>
                    <label class="text-sm text-stone-500 mb-1 block font-medium">麦感 (Malty Score: 1-5)</label>
                    <input type="range" id="malty-score" min="1" max="5" step="1" value="3" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-amber-700">
                </div>
                <textarea id="whisky-note" placeholder="テイスティングノート..." class="w-full p-3 bg-stone-50 border border-stone-200 rounded-lg h-24"></textarea>
                <button id="save-btn" class="w-full amber-gradient text-white font-bold py-3 rounded-lg shadow-lg active:opacity-80 transition-opacity">保存する</button>
            </div>
        </section>
        <div id="notes-list" class="space-y-4"></div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-md border border-stone-200 rounded-full shadow-2xl flex justify-around p-2 z-40 text-stone-400">
        <button class="p-2 text-amber-700 font-serif italic font-bold">W.N.</button>
        <button id="logout-btn" class="p-2 text-[10px] uppercase font-bold">Sign Out</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552",
            measurementId: "G-V02L78VHJP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const log = (msg) => document.getElementById('debug-log').innerText = msg;
        const errDisplay = document.getElementById('error-message');

        // ポップアップ方式に戻す
        document.getElementById('login-btn').onclick = async () => {
            log("Opening Popup...");
            try {
                await signInWithPopup(auth, provider);
                log("Login Success via Popup");
            } catch (error) {
                console.error(error);
                log("Error: " + error.code);
                errDisplay.innerText = "エラー: " + error.message;
            }
        };

        document.getElementById('logout-btn').onclick = () => { if(confirm("Sign out?")) signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            const loading = document.getElementById('loading-view');
            const overlay = document.getElementById('login-overlay');
            const appContent = document.getElementById('app-content');

            if (user) {
                log("Logged in as: " + user.email);
                overlay.classList.add('hidden');
                loading.classList.add('hidden');
                appContent.classList.remove('hidden');
                loadNotes(user.uid);
            } else {
                log("No user session.");
                overlay.classList.remove('hidden');
                loading.classList.add('hidden');
                appContent.classList.add('hidden');
            }
        });

        async function loadNotes(uid) {
            const q = query(collection(db, "whisky_notes"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snaps) => {
                const list = document.getElementById('notes-list');
                list.innerHTML = '';
                snaps.forEach((doc) => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = "bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-700 mb-4";
                    el.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold">${d.name}</h3>
                            <span class="text-[10px] font-bold bg-amber-100 px-2 py-0.5 rounded-full">MALTY: ${d.maltyScore}</span>
                        </div>
                        <p class="text-[10px] text-stone-400 mt-1">${d.distillery || ''} ${d.vintage || ''}</p>
                        <p class="text-sm mt-2 text-stone-600">${d.note || ''}</p>
                    `;
                    list.appendChild(el);
                });
            }, (error) => {
                log("Firestore Error: " + error.code);
            });
        }

        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('whisky-name').value;
            if (!name) return alert("銘柄名を入力してください");
            try {
                await addDoc(collection(db, "whisky_notes"), {
                    userId: auth.currentUser.uid,
                    name: name,
                    distillery: document.getElementById('whisky-distillery').value,
                    vintage: document.getElementById('whisky-vintage').value,
                    maltyScore: document.getElementById('malty-score').value,
                    note: document.getElementById('whisky-note').value,
                    createdAt: serverTimestamp()
                });
                document.getElementById('whisky-name').value = '';
                document.getElementById('whisky-note').value = '';
            } catch (e) { log("Save Error: " + e.code); }
        };
    </script>
</body>
</html>
