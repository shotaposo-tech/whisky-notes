<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Whisky Tasting Notes</title>
    <link rel="apple-touch-icon" href="IMG_8347.jpeg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'whisky-dark': '#3f2305',
                        'whisky-amber': '#d97706',
                        'whisky-light': '#fef3c7',
                    },
                }
            }
        }
    </script>
    <style>
        .hidden { display: none !important; }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #78350f 100%); }
        meta[name="apple-mobile-web-app-capable"] { content: "yes"; }
        
        /* 星評価用のスタイル */
        .star-rating {
            direction: rtl;
            display: inline-flex;
        }
        .star-rating input[type="radio"] {
            display: none;
        }
        .star-rating label {
            color: #d1d5db; /* stone-300 */
            font-size: 1.75rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating input[type="radio"]:checked ~ label {
            color: #f59e0b; /* amber-500 */
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #fbbf24; /* amber-400 */
        }
    </style>
</head>
<body class="bg-stone-100 min-h-screen pb-24 text-stone-900 font-sans">

    <div id="loading-view" class="fixed inset-0 z-[60] flex items-center justify-center bg-stone-900 text-white">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-amber-500 border-t-transparent rounded-full"></div>
            <p class="text-xs text-stone-400">Loading your collection...</p>
        </div>
    </div>

    <div id="login-overlay" class="fixed inset-0 bg-stone-900 z-50 hidden flex flex-col items-center justify-center p-6 text-white overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?q=80&w=800'); background-size: cover; background-position: center;"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-5xl font-serif font-bold mb-3 italic text-whisky-light">Whisky Notes</h1>
            <p class="text-stone-300 mb-12 text-sm tracking-widest">DRAMATIC TASTING LOG</p>
            <button id="login-btn" class="bg-white text-stone-900 px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 active:scale-95 transition-all mx-auto">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                Sign in with Google
            </button>
            <p id="error-msg" class="mt-4 text-red-400 text-[10px]"></p>
        </div>
    </div>

    <header class="amber-gradient text-white p-5 shadow-lg sticky top-0 z-40 flex justify-between items-center">
        <h1 class="text-2xl font-serif font-bold italic">My Dram</h1>
        <div class="p-1 px-3 bg-white/20 rounded-full text-xs font-mono" id="user-display"></div>
    </header>

    <main id="app-content" class="p-4 max-w-md mx-auto hidden pb-10">
        
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-stone-200">
            <h2 class="text-xs uppercase text-stone-400 font-bold tracking-wider mb-4">New Tasting Note</h2>
            
            <input type="text" id="whisky-name" placeholder="銘柄名 (例: Macallan 12yo)" class="w-full p-3.5 mb-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500 text-base" />
            
            <div class="flex gap-2 mb-3">
                <input type="text" id="whisky-distillery" placeholder="蒸留所/地域" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
                <input type="number" id="whisky-vintage" placeholder="Year" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
            </div>

            <div class="flex gap-2 mb-5">
                <input type="text" id="whisky-abv" placeholder="度数 % (ABV)" class="w-1/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
                <input type="text" id="whisky-cask" placeholder="Cask Type (樽)" class="w-2/3 p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
            </div>

            <div class="space-y-3 mb-5">
                <div class="relative">
                    <span class="absolute top-3 left-3 text-xs font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded">NOSE</span>
                    <textarea id="whisky-nose" placeholder="香り: バニラ、蜂蜜、ほのかなスモーキー..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 leading-relaxed"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-xs font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded">PALATE</span>
                    <textarea id="whisky-palate" placeholder="味わい: オイリー、スパイシー、熟したリンゴ..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-24 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 leading-relaxed"></textarea>
                </div>
                <div class="relative">
                    <span class="absolute top-3 left-3 text-xs font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded">FINISH</span>
                    <textarea id="whisky-finish" placeholder="余韻: 長く続く、ドライ、麦の甘み..." class="w-full pt-10 p-3 bg-white border border-stone-200 rounded-lg h-20 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 leading-relaxed"></textarea>
                </div>
            </div>

            <div class="flex items-center justify-between gap-4 pt-2 border-t border-stone-100">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-stone-400 uppercase font-bold tracking-wider">Rating</span>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3" checked /><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                    </div>
                </div>
                <button id="save-btn" class="flex-1 amber-gradient text-white font-bold py-4 rounded-xl shadow-lg active:opacity-90 transition-all active:scale-95 text-lg">
                    Add to Collection
                </button>
            </div>
        </div>

        <div id="notes-list" class="space-y-5">
            </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 bg-stone-900/90 backdrop-blur-sm rounded-full shadow-2xl flex justify-center items-center z-40 border border-stone-700">
        <div class="text-whisky-amber font-serif italic font-bold text-lg tracking-wider">W.N.</div>
    </nav>

    <script type="module">
        // Firebaseライブラリのインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            where,
            orderBy,
            onSnapshot,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (あなたのプロジェクトID)
        const firebaseConfig = {
            apiKey: "AIzaSyDD8ID3-DtqmA7F7Q0PgNIc4P7Ig2wEFAs",
            authDomain: "whisky-notes-6851c.firebaseapp.com",
            projectId: "whisky-notes-6851c",
            storageBucket: "whisky-notes-6851c.firebasestorage.app",
            messagingSenderId: "242604002071",
            appId: "1:242604002071:web:9fb1f459b2a44672ac4552"
        };

        // Firebase初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const $ = (id) => document.getElementById(id);

        // ログイン状態の管理
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ログイン中
                $("login-overlay").classList.add("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.remove("hidden");
                $("user-display").innerText = user.displayName || "My Account";
                loadNotes(user.uid);
            } else {
                // ログアウト中
                $("login-overlay").classList.remove("hidden");
                $("loading-view").classList.add("hidden");
                $("app-content").classList.add("hidden");
            }
        });

        // Googleログイン処理
        $("login-btn").onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error(e);
                $("error-msg").innerText = "ログインに失敗しました。";
            }
        };

        // ノート読み込み（リアルタイムアップデート）
        function loadNotes(uid) {
            const q = query(
                collection(db, "whisky_notes"),
                where("userId", "==", uid),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = $("notes-list");
                list.innerHTML = "";
                
                if (snapshot.empty) {
                    list.innerHTML = `
                        <div class="text-center py-16 text-stone-400 bg-white rounded-2xl border border-stone-200 border-dashed">
                            <div class="text-5xl mb-4">🥃</div>
                            <p class="text-sm">まだ記録がありません。<br>最初の一杯を記録しましょう。</p>
                        </div>
                    `;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // 星評価の生成
                    const rating = data.rating || 0;
                    let starsHtml = '';
                    for(let i=1; i<=5; i++) {
                        starsHtml += i <= rating ? '<span class="text-amber-500">★</span>' : '<span class="text-stone-300">★</span>';
                    }

                    const card = document.createElement("div");
                    card.className = "bg-white p-6 rounded-2xl shadow-sm border border-stone-100 mb-3 relative overflow-hidden";
                    
                    // カードのHTML構造（テイスティングシート風）
                    card.innerHTML = `
                        <div class="flex justify-between items-start gap-2 mb-2">
                            <h3 class="font-bold text-xl text-stone-900 leading-tight">${escapeHtml(data.name || "Unnamed Dram")}</h3>
                            <div class="text-sm flex star-display items-center bg-stone-50 px-2 py-1 rounded-lg border border-stone-100">
                                ${starsHtml}
                            </div>
                        </div>
                        
                        <p class="text-xs text-stone-500 mb-4 pb-2 border-b border-stone-100 font-mono">
                            ${escapeHtml(data.distillery || "Unknown Distillery")}
                            ${data.vintage ? ' • ' + escapeHtml(data.vintage) : ''}
                            ${data.abv ? ' • ' + escapeHtml(data.abv) + '%' : ''}
                            ${data.cask ? ' • ' + escapeHtml(data.cask) : ''}
                        </p>
                        
                        <div class="space-y-3.5 text-sm text-stone-700 leading-relaxed">
                            ${data.nose ? `<div class="grid grid-cols-[50px,1fr] gap-2"><span class="text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded self-start mt-0.5 text-center">NOSE</span><p class="whitespace-pre-wrap">${escapeHtml(data.nose)}</p></div>` : ''}
                            ${data.palate ? `<div class="grid grid-cols-[50px,1fr] gap-2"><span class="text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded self-start mt-0.5 text-center">PALATE</span><p class="whitespace-pre-wrap">${escapeHtml(data.palate)}</p></div>` : ''}
                            ${data.finish ? `<div class="grid grid-cols-[50px,1fr] gap-2"><span class="text-[10px] font-bold text-amber-900 bg-amber-100 px-1.5 py-0.5 rounded self-start mt-0.5 text-center">FINISH</span><p class="whitespace-pre-wrap">${escapeHtml(data.finish)}</p></div>` : ''}
                        </div>
                    `;
                    list.appendChild(card);
                });
            }, (err) => {
                console.error("Firestore Error:", err);
                $("notes-list").innerHTML = `<div class="text-red-500 text-xs p-4 bg-red-50 rounded-lg text-center">データの読み込みに失敗しました。<br>Firestoreのインデックス設定を確認してください。</div>`;
            });
        }

        // HTMLエスケープ（セキュリティ対策）
        function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        }

        // 保存処理
        $("save-btn").onclick = async () => {
            const name = $("whisky-name").value.trim();
            if (!name) return alert("銘柄名を入力してください");

            // 選択された星評価を取得
            const ratingElement = document.querySelector('input[name="rating"]:checked');
            const rating = ratingElement ? Number(ratingElement.value) : 0;

            const btn = $("save-btn");
            btn.disabled = true;
            btn.innerText = "Saving...";
            btn.classList.add("opacity-60");

            try {
                // Firestoreへデータ追加
                await addDoc(collection(db, "whisky_notes"), {
                    userId: auth.currentUser.uid,
                    name: name,
                    distillery: $("whisky-distillery").value.trim(),
                    vintage: $("whisky-vintage").value,
                    abv: $("whisky-abv").value.trim(),
                    cask: $("whisky-cask").value.trim(),
                    nose: $("whisky-nose").value.trim(),
                    palate: $("whisky-palate").value.trim(),
                    finish: $("whisky-finish").value.trim(),
                    rating: rating, // 星評価
                    createdAt: serverTimestamp() // サーバー側の日時
                });
                
                // フォームリセット
                $("whisky-name").value = "";
                $("whisky-distillery").value = "";
                $("whisky-vintage").value = "";
                $("whisky-abv").value = "";
                $("whisky-cask").value = "";
                $("whisky-nose").value = "";
                $("whisky-palate").value = "";
                $("whisky-finish").value = "";
                $("star3").checked = true; // 星をデフォルト(3)に戻す
                
                // フォームの先頭にスクロール（入力完了感）
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (e) {
                console.error("Error adding document: ", e);
                alert("保存に失敗しました。もう一度お試しください。");
            } finally {
                btn.disabled = false;
                btn.innerText = "Add to Collection";
                btn.classList.remove("opacity-60");
            }
        };
    </script>
</body>
</html>
